<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Efecto Logo</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        h2 {
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* Efecto 1: Brillo que recorre */
        @keyframes shine {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        .logo-shine {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .logo-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 45%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0.3) 55%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: shine 2s ease-in-out;
            pointer-events: none;
        }

        /* Efecto 2: Brillo continuo */
        .logo-shine-loop {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .logo-shine-loop::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 45%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0.3) 55%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: shine 3s ease-in-out infinite;
            pointer-events: none;
        }

        /* Efecto 3: Pulso suave */
        @keyframes pulse {
            0%, 100% {
                filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            }
        }

        .logo-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        /* Efecto 4: Destello intenso */
        @keyframes flash {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 1;
                filter: brightness(1.5) drop-shadow(0 0 30px rgba(255, 255, 255, 0.9));
            }
        }

        .logo-flash {
            animation: flash 3s ease-in-out;
        }

        .logo {
            height: 200px;
            width: auto;
        }

        button {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h2>Efecto 1: Brillo que recorre (una vez)</h2>
    <div class="container">
        <div class="logo-shine" id="effect1">
            <img src="/Logo-calificalo.png" alt="Calificalo" class="logo">
        </div>
        <br>
        <button onclick="replayEffect('effect1', 'logo-shine')">▶️ Ver de nuevo</button>
    </div>

    <h2>Efecto 2: Brillo continuo (se repite)</h2>
    <div class="container">
        <div class="logo-shine-loop">
            <img src="/Logo-calificalo.png" alt="Calificalo" class="logo">
        </div>
    </div>

    <h2>Efecto 3: Pulso suave (continuo)</h2>
    <div class="container">
        <div class="logo-pulse">
            <img src="/Logo-calificalo.png" alt="Calificalo" class="logo">
        </div>
    </div>

    <h2>Efecto 4: Destello intenso (una vez)</h2>
    <div class="container">
        <div class="logo-flash" id="effect4">
            <img src="/Logo-calificalo.png" alt="Calificalo" class="logo">
        </div>
        <br>
        <button onclick="replayEffect('effect4', 'logo-flash')">▶️ Ver de nuevo</button>
    </div>

    <script>
        function replayEffect(elementId, className) {
            const element = document.getElementById(elementId);
            element.classList.remove(className);
            void element.offsetWidth; // Forzar reflow
            element.classList.add(className);
        }
    </script>
</body>
</html>
